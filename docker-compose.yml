# 배포 전 통합 테스트 — 앱 + PostgreSQL ×2 (결정 13).
# catalog=5433, profile=5434 로 호스트 포트를 분리한다.
#
# [변경 2026-07-15] MVP 검색은 Spring 위임(벡터/카탈로그 미러 없음)이라 pg-catalog 는
# order_seed 테이블(판매자 통계·추천 dedup·프로필 신호)을 호스트한다.
# [변경 2026-07-20, 이슈 #31] §4.8 I-17 배치 MVP 편입 + Google gemini-embedding-001 확정으로
# products(AI 생성물: search_doc·embedding vector(1536)·extras) + HNSW 인덱스가 MVP 로 되살아남
# (db/catalog/init/00_products.sql). pg-profile 은 프로필 스토어로 계속 필요하다.
# [변경 2026-07-20, 이슈 #33] ProfileStore·구매자 스레드 상태(Thread/Cart/Revert)를 LangGraph
# BaseStore(pg-profile)로 이관 — processed_events(session-end 멱등 lifecycle 테이블)는
# 빈 볼륨에서 init-script가 생성하고 기존 볼륨은 앱 연결 시 idempotent migration한다.
# 나머지 스키마는 AsyncPostgresStore.setup() 이 앱 기동 시 자체 생성한다(pgvector 확장 포함).

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      pg-catalog:
        condition: service_healthy
      pg-profile:
        condition: service_healthy
    restart: unless-stopped

  pg-catalog:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis
      POSTGRES_DB: catalog
    ports:
      - "5433:5432"
    volumes:
      - pg-catalog-data:/var/lib/postgresql/data
      - ./db/catalog/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pg-profile:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis
      POSTGRES_DB: profile
    ports:
      - "5434:5432"
    volumes:
      - pg-profile-data:/var/lib/postgresql/data
      - ./db/profile/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d profile"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pg-catalog-data:
  pg-profile-data:
