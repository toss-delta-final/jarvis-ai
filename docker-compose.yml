# 배포 전 통합 테스트 — 앱 + PostgreSQL ×2 (결정 13).
# catalog=5433, profile=5434 로 호스트 포트를 분리한다.
#
# [변경 2026-07-15] MVP 검색은 Spring 위임(벡터/카탈로그 미러 없음)이라 pg-catalog 는
# 이제 order_seed 테이블(판매자 통계·추천 dedup·프로필 신호)을 호스트하고, 고도화 시
# 상품 스냅샷/로그 저장소로 확장된다. pgvector 확장은 고도화(products/HNSW) 대비 유지한다.
# pg-profile 은 프로필 스토어로 계속 필요하다.

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      pg-catalog:
        condition: service_healthy
      pg-profile:
        condition: service_healthy
    restart: unless-stopped

  pg-catalog:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis
      POSTGRES_DB: catalog
    ports:
      - "5433:5432"
    volumes:
      - pg-catalog-data:/var/lib/postgresql/data
      - ./db/catalog/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pg-profile:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis
      POSTGRES_DB: profile
    ports:
      - "5434:5432"
    volumes:
      - pg-profile-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d profile"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pg-catalog-data:
  pg-profile-data:
