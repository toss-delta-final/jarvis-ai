name: Claude PR Review

# PR 이 열리거나 갱신될 때 Claude 가 diff 를 리뷰하고 인라인 코멘트를 자동으로 단다.
# 인증: 구독 OAuth 토큰 (claude setup-token → 리포 시크릿 CLAUDE_CODE_OAUTH_TOKEN).
# review-only — 커밋/푸시하지 않고 코멘트만 남긴다.

permissions:
  contents: read
  pull-requests: write
  id-token: write   # claude-code-action OIDC 토큰 교환에 필요

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

jobs:
  review:
    runs-on: ubuntu-latest
    # draft·fork PR 스킵 (fork 는 시크릿 접근 불가)
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            이 PR 의 `app/` 아래 Python 코드 변경을 리뷰해줘 (`docs/`·`*.md` 문서는 무시).
            가장 중요한 이슈 위주로 해당 라인에 인라인 리뷰 코멘트를 남겨줘.
            인라인 코멘트는 반드시 `mcp__github_inline_comment__create_inline_comment` 도구를 `confirmed: true` 로 호출해 게시해.
            중점: 논리 버그·보안(IDOR: 신원을 요청 본문에서 받는지)·계약 위반(api-spec)·미검증 입력.
            사소한 포매팅·네이밍은 지적하지 마. 한국어로.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Read,Grep,Glob,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
            --max-turns 40
